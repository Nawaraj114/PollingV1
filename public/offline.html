<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1473e6" />
    <title>FriendCircle is offline</title>
    <style>
      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #f4f5f7;
        color: #202124;
        font-family: Arial, Helvetica, sans-serif;
        padding: 24px;
      }
      main {
        width: min(100%, 520px);
        border: 1px solid rgba(0, 0, 0, .07);
        border-radius: 32px;
        background: white;
        padding: 40px 32px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(34, 37, 43, .08);
      }
      img { width: 72px; height: 72px; border-radius: 20px; }
      h1 { margin: 24px 0 0; font-size: 32px; letter-spacing: -.04em; }
      p { margin: 14px auto 0; max-width: 390px; color: #74777f; line-height: 1.7; }
      a {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        margin-top: 26px;
        border-radius: 999px;
        background: #1473e6;
        color: white;
        font-size: 14px;
        font-weight: 700;
        padding: 12px 22px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/friendcircle-192.png" alt="" />
      <h1>You’re offline</h1>
      <p>
        FriendCircle needs an internet connection to securely load bills,
        balances, payments, and polls. Reconnect, then try again.
      </p>
      <a href="/dashboard">Try again</a>
    </main>
  </body>
</html>
